name: Validate and publish dashboard

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect unverified surveillance hits
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/update_sources.py

      - name: Validate dashboard data and static files
        run: python scripts/validate_site.py

      - name: Commit surveillance outputs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add updates data
          git diff --cached --quiet || git commit -m "Update Lyme vaccine surveillance hits"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
